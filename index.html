<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>으뜸플러스 홍성내포점 가격표</title>
    <style>
        :root { --main-color: #f39c12; --accent-red: #e74c3c; }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: #f1f3f5; padding-bottom: 80px; }
        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        header { background: #fff; padding: 30px; text-align: center; border-bottom: 3px solid var(--main-color); }
        
        .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .full-width { grid-column: span 2; }
        .card-title { font-size: 18px; font-weight: bold; color: var(--main-color); margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        
        .price-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 15px; }
        .sale-price { color: var(--accent-red); font-weight: 800; }

        /* 설정창 스타일 */
        #admin-panel { display: none; position: fixed; top: 10%; left: 5%; right: 5%; background: white; z-index: 1000; padding: 20px; border-radius: 15px; box-shadow: 0 0 50px rgba(0,0,0,0.3); max-height: 80%; overflow-y: auto; }
        .admin-item { display: flex; justify-content: space-between; margin-bottom: 10px; align-items: center; }
        .admin-item input { width: 100px; padding: 5px; text-align: right; }
        
        /* 설정 버튼 */
        .admin-btn { position: fixed; bottom: 20px; right: 20px; background: #333; color: #fff; border: none; padding: 10px 15px; border-radius: 30px; cursor: pointer; opacity: 0.5; }
        .admin-btn:hover { opacity: 1; }
        .save-btn { width: 100%; background: var(--main-color); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; margin-top: 10px; }

        @media (max-width: 600px) { .price-grid { grid-template-columns: 1fr; } .full-width { grid-column: span 1; } }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0;">으뜸플러스 홍성내포점</h1>
    <p style="color:#666;">2층의 기적, 도매가 안경원</p>
</header>

<div class="container">
    <div class="price-grid">
        <div class="card">
            <div class="card-title">초발수 (USH)</div>
            <div class="price-row"><span>1.56 구면</span> <span class="sale-price" id="p_ush_156">6,000원</span></div>
            <div class="price-row"><span>1.60 비구면</span> <span class="sale-price" id="p_ush_160">17,000원</span></div>
            <div class="price-row"><span>1.67 비구면</span> <span class="sale-price" id="p_ush_167">26,000원</span></div>
        </div>

        <div class="card">
            <div class="card-title">청광차단 (420)</div>
            <div class="price-row"><span>1.56 구면</span> <span class="sale-price" id="p_bl_156">13,000원</span></div>
            <div class="price-row"><span>1.60 비구면</span> <span class="sale-price" id="p_bl_160">24,000원</span></div>
            <div class="price-row"><span>1.67 비구면</span> <span class="sale-price" id="p_bl_167">32,000원</span></div>
        </div>
    </div>
</div>

<div id="admin-panel">
    <h3>⚙️ 가격 수정 모드</h3>
    <div class="admin-item"><span>초발수 1.56</span> <input type="text" id="in_ush_156" value="6,000원"></div>
    <div class="admin-item"><span>초발수 1.60</span> <input type="text" id="in_ush_160" value="17,000원"></div>
    <div class="admin-item"><span>청광 1.56</span> <input type="text" id="in_bl_156" value="13,000원"></div>
    <button class="save-btn" onclick="savePrices()">저장 후 적용</button>
    <button class="save-btn" style="background:#ccc;" onclick="document.getElementById('admin-panel').style.display='none'">닫기</button>
</div>

<button class="admin-btn" onclick="openAdmin()">⚙️ 가격 설정</button>

<script>
    // 페이지 로드 시 저장된 가격 불러오기
    window.onload = function() {
        const ids = ['ush_156', 'ush_160', 'bl_156']; // 필요한 ID들을 등록
        ids.forEach(id => {
            const saved = localStorage.getItem('price_' + id);
            if (saved) {
                document.getElementById('p_' + id).innerText = saved;
                document.getElementById('in_' + id).value = saved;
            }
        });
    }

    function openAdmin() {
        const pw = prompt("관리자 비밀번호를 입력하세요.");
        if (pw === "1234") { // 비밀번호 설정
            document.getElementById('admin-panel').style.display = 'block';
        } else {
            alert("비밀번호가 틀렸습니다.");
        }
    }

    function savePrices() {
        const ids = ['ush_156', 'ush_160', 'bl_156'];
        ids.forEach(id => {
            const val = document.getElementById('in_' + id).value;
            localStorage.setItem('price_' + id, val);
            document.getElementById('p_' + id).innerText = val;
        });
        alert("가격이 저장되었습니다!");
        document.getElementById('admin-panel').style.display = 'none';
    }
</script>

</body>
</html>
